<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tagline }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f0f4ff; color: #1a1a2e; margin: 0; }
        .hero {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; text-align: center; padding: 100px 24px;
            clip-path: ellipse(100% 85% at 50% 15%);
        }
        h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 12px; }
        .role { font-size: 1.1rem; opacity: 0.85; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .card {
            background: white; border-radius: 16px; padding: 28px;
            box-shadow: 0 4px 24px rgba(102,126,234,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        .card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; color: #667eea; }
        .card p { font-size: 0.9rem; color: #555; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>{{ tagline }}</h1>
        <p class="role">{{ target_role }}</p>
    </div>
    <div class="container">
        <div class="grid">
            {% for project in projects %}
            <div class="card">
                <h3>{{ project.name }}</h3>
                <p>{{ project.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
