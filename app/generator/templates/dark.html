<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tagline }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0d1117; color: #c9d1d9; }
        .hero { background: linear-gradient(135deg, #161b22, #1f6feb22); padding: 80px 0; }
        h1 { color: #58a6ff; font-weight: 700; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .badge-lang { background: #1f6feb; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; margin-right: 6px; }
    </style>
</head>
<body>
    <section class="hero text-center">
        <div class="container">
            <h1>{{ tagline }}</h1>
            <p class="lead text-secondary">{{ target_role }}</p>
        </div>
    </section>
    <div class="container py-5">
        <h2 class="mb-4" style="color:#58a6ff;">Projects</h2>
        {% for project in projects %}
        <div class="card">
            <h5>{{ project.name }}</h5>
            <p class="text-secondary mb-0">{{ project.description }}</p>
        </div>
        {% endfor %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
