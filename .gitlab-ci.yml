image: python:3.11-slim

stages:
  - build
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip/

install-deps:
  stage: build
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt



unit-tests:
  stage: test
  script:
    - pip install -r requirements.txt pytest pytest-cov
    - pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'

integration-tests:
  stage: test
  script:
    - pip install -r requirements.txt pytest
    - pytest tests/integration/ -v --tb=short
  allow_failure: true

deploy-staging:
  stage: deploy
  script:
    - apt-get update -qq && apt-get install -y curl
    - echo "Deploying to https://protofolio-backend.onrender.com"
    - curl --max-time 60 https://protofolio-backend.onrender.com/ && echo "Deployment live" || echo "Service warming up on Render free tier"
  allow_failure: true
  only:
    - develop

deploy-production:
  stage: deploy
  script:
    - apt-get update -qq && apt-get install -y curl
    - echo "Deploying to https://protofolio-backend.onrender.com"
    - curl --max-time 60 https://protofolio-backend.onrender.com/ && echo "Production live" || echo "Service warming up on Render free tier"
  allow_failure: true
  only:
    - main
  when: manual
