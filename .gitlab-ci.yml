image: python:3.11-slim

stages:
  - build
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip/

install-deps:
  stage: build
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt

lint:
  stage: test
  script:
    - pip install flake8
    - flake8 app/ --max-line-length=120

unit-tests:
  stage: test
  script:
    - pip install -r requirements.txt pytest pytest-cov
    - pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'

integration-tests:
  stage: test
  script:
    - pip install -r requirements.txt pytest
    - pytest tests/integration/ -v --tb=short
  allow_failure: true

deploy-staging:
  stage: deploy
  script:
    - echo "Staging deploy triggered for branch $CI_COMMIT_BRANCH"
  only:
    - develop

deploy-production:
  stage: deploy
  script:
    - echo "Production deploy triggered"
  only:
    - main
  when: manual
  when: manual
